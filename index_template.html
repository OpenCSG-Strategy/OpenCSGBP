<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[PPT标题]</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --white:#FFFFFF;
    --ink:#1A1A1A;
    --ink-secondary:#525252;
    --ink-tertiary:#8C8C8C;
    --accent:#1D8C80;
    --accent-soft:#E8F5F3;
    --accent-bg:#F0F9F8;
    --hairline:#E8E8E8;
    --hairline-strong:#D0D0D0;
    --sans:Inter,"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;font-family:var(--sans);-webkit-font-smoothing:antialiased}

  /* ===== Deck ===== */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;transition:transform .85s cubic-bezier(.65,0,.35,1);z-index:1}
  .slide{width:100vw;height:100vh;flex-shrink:0;position:relative;padding:6vh 6vw 8vh;overflow:hidden;background:var(--white);color:var(--ink)}

  /* ===== Logo ===== */
  .logo{position:absolute;top:4.5vh;right:5vw;height:20px;display:flex;align-items:center;gap:6px;z-index:10}
  .logo svg{height:20px;width:auto}

  /* ===== Accent Bar (left of title) ===== */
  .accent-bar{width:3px;height:48px;background:var(--accent);flex-shrink:0}

  /* ===== Page number ===== */
  .page-num{position:absolute;bottom:3vh;right:5vw;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-tertiary)}

  /* ===== Headline sizes ===== */
  .headline-xl{font-weight:200;font-size:clamp(36px,4.5vw,64px);line-height:1.15;letter-spacing:-.02em}
  .headline-lg{font-weight:300;font-size:clamp(28px,3.2vw,48px);line-height:1.2;letter-spacing:-.01em}
  .headline-md{font-weight:400;font-size:clamp(22px,2.2vw,32px);line-height:1.3}
  .body-lg{font-weight:400;font-size:clamp(16px,1.15vw,18px);line-height:1.7;color:var(--ink-secondary)}
  .body{font-weight:400;font-size:clamp(14px,1vw,16px);line-height:1.6;color:var(--ink-secondary)}
  .label{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:500}
  .caption{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-tertiary)}

  /* ===== Hairline ===== */
  .hairline{width:100%;height:1px;background:var(--hairline)}
  .hairline-accent{width:40px;height:2px;background:var(--accent)}

  /* ===== Frame ===== */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0}

  /* ===== Grid ===== */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:4vw}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3vw}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:2vw}

  /* ===== Stat ===== */
  .stat-number{font-weight:200;font-size:clamp(48px,5vw,80px);line-height:1;color:var(--accent);letter-spacing:-.03em}
  .stat-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-tertiary);margin-top:8px}

  /* ===== Callout ===== */
  .callout{padding-left:16px;border-left:2px solid var(--accent)}

  /* ===== Dark slide ===== */
  .slide.dark{background:var(--ink);color:var(--white)}
  .slide.dark .body-lg,.slide.dark .body{color:rgba(255,255,255,.65)}
  .slide.dark .label{color:var(--accent-soft)}
  .slide.dark .caption{color:rgba(255,255,255,.4)}
  .slide.dark .page-num{color:rgba(255,255255,.35)}
  .slide.dark .accent-bar{background:var(--accent-soft)}
  .slide.dark .hairline{background:rgba(255,255,255,.1)}

  /* ===== Accent slide ===== */
  .slide.accent{background:var(--accent);color:var(--white)}
  .slide.accent .body-lg,.slide.accent .body{color:rgba(255,255,255,.75)}
  .slide.accent .label{color:rgba(255,255,255,.85)}
  .slide.accent .caption{color:rgba(255,255,255,.5)}
  .slide.accent .page-num{color:rgba(255,255,255,.4)}
  .slide.accent .accent-bar{background:var(--white)}
  .slide.accent .hairline{background:rgba(255,255,255,.15)}

  /* ===== Nav dots ===== */
  #nav{position:fixed;bottom:2.5vh;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:100;opacity:.3;transition:opacity .3s}
  #nav:hover{opacity:.7}
  .nav-dot{width:6px;height:6px;background:currentColor;cursor:pointer;transition:all .25s}
  .nav-dot.on{width:20px;background:var(--accent)}

  /* ===== Hints ===== */
  #hints{position:fixed;bottom:2.5vh;left:3vw;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink-tertiary);opacity:.25;z-index:100}

  /* ===== Index overlay ===== */
  #idx{position:fixed;inset:0;z-index:200;background:rgba(26,26,26,.95);display:none;flex-direction:column;padding:8vh 8vw}
  #idx.on{display:flex}
  #idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;overflow-y:auto}
  .idx-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:16px;cursor:pointer;transition:all .2s;font-size:13px;color:rgba(255,255,255,.7)}
  .idx-item:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
  .idx-num{font-family:var(--mono);font-size:10px;opacity:.4;margin-bottom:4px;letter-spacing:.1em}
  .idx-close{position:fixed;top:3vh;right:4vw;font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.4);cursor:pointer}
  .idx-close:hover{color:rgba(255,255,255,.8)}

  /* ===== Responsive ===== */
  @media(max-width:768px){
    .slide{padding:5vh 5vw 10vh}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
    .headline-xl{font-size:32px}
    .headline-lg{font-size:24px}
    .stat-number{font-size:40px}
  }
</style>
</head>
<body>

<!-- Logo SVG definition -->
<svg style="display:none">
  <symbol id="logo" viewBox="0 0 140 28">
    <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.35"/>
    <circle cx="14" cy="14" r="7.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.6"/>
    <circle cx="14" cy="14" r="3.5" fill="currentColor"/>
    <text x="32" y="19" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="currentColor" letter-spacing="0.5">OpenCSG</text>
  </symbol>
</svg>

<div id="deck">
  <!-- SLIDES HERE -->
</div>

<div id="nav"></div>
<div id="hints">&larr; &rarr; &middot; ESC</div>

<div id="idx">
  <div class="idx-close" onclick="closeIdx()">CLOSE</div>
  <div id="idx-grid"></div>
</div>

<script>
// ===== Slide Engine =====
const deck=document.getElementById('deck');
const slides=[...deck.children].filter(e=>e.classList.contains('slide'));
let cur=0;

function go(i){
  if(i<0)i=0;if(i>=slides.length)i=slides.length-1;
  cur=i;
  deck.style.transform='translateX(-'+i*100+'vw)';
  document.querySelectorAll('.nav-dot').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.querySelectorAll('.page-num').forEach((p,j)=>{if(p.closest('.slide')===slides[i])p.style.opacity='1';else p.style.opacity='0'});
}
function next(){if(cur<slides.length-1)go(cur+1)}
function prev(){if(cur>0)go(cur-1)}

// Keyboard
document.addEventListener('keydown',e=>{
  const idx=document.getElementById('idx');
  if(idx.classList.contains('on')){
    if(e.key==='Escape'){idx.classList.remove('on');e.preventDefault()}
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next()}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev()}
  else if(e.key==='Home'){e.preventDefault();go(0)}
  else if(e.key==='End'){e.preventDefault();go(slides.length-1)}
  else if(e.key==='Escape'){e.preventDefault();openIdx()}
});

// Wheel
let wlock=false;
document.addEventListener('wheel',e=>{
  if(wlock)return;
  const idx=document.getElementById('idx');
  if(idx.classList.contains('on'))return;
  if(Math.abs(e.deltaY)<20&&Math.abs(e.deltaX)<20)return;
  wlock=true;setTimeout(()=>wlock=false,700);
  if(e.deltaY>0||e.deltaX>0)next();else prev();
},{passive:true});

// Touch
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=tx-e.changedTouches[0].screenX;
  if(Math.abs(dx)>60)dx>0?next():prev();
},{passive:true});

// Nav dots
const nav=document.getElementById('nav');
nav.innerHTML=slides.map((_,i)=>'<div class="nav-dot'+(i===0?' on':'')+'" onclick="go('+i+')"></div>').join('');

// Page numbers
slides.forEach((s,i)=>{
  const pn=document.createElement('div');
  pn.className='page-num';
  pn.textContent=String(i+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
  pn.style.opacity=i===0?'1':'0';
  s.appendChild(pn);
});

// Logos
slides.forEach(s=>{
  const logo=document.createElement('div');
  logo.className='logo';
  logo.innerHTML='<svg><use href="#logo"/></svg>';
  s.appendChild(logo);
});

// Index
function openIdx(){
  const grid=document.getElementById('idx-grid');
  grid.innerHTML=slides.map((s,i)=>{
    const t=s.querySelector('h1,h2,h3,.headline-xl,.headline-lg,.headline-md')?.textContent?.slice(0,30)||'';
    return'<div class="idx-item" onclick="go('+i+');closeIdx()">'+
      '<div class="idx-num">'+String(i+1).padStart(2,'0')+'</div>'+t+'</div>';
  }).join('');
  document.getElementById('idx').classList.add('on');
}
function closeIdx(){document.getElementById('idx').classList.remove('on')}

// Init
go(0);
</script>
</body>
</html>
