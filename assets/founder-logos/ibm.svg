  <g fill="#1F70C1" transform="translate(8,12)">
    <!-- I -->
    <path d="M0 0 H14 V46 H0 Z M0 4 H14 V8 H0 Z M0 12 H14 V16 H0 Z M0 20 H14 V24 H0 Z M0 28 H14 V32 H0 Z M0 36 H14 V40 H0 Z"/>
    <!-- B -->
    <path d="M22 0 H38 Q48 0 48 8 Q48 14 42 16 Q50 18 50 26 Q50 36 38 36 H22 Z M28 4 V16 H36 Q40 16 40 10 Q40 4 36 4 Z M28 20 V32 H38 Q42 32 42 26 Q42 20 38 20 Z"/>
    <!-- B stripes -->
    <path d="M28 6 H36 V14 H28 Z" fill="#FFFFFF"/>
    <path d="M28 22 H38 V30 H28 Z" fill="#FFFFFF"/>
    <!-- M -->
    <path d="M58 0 H70 L78 22 L86 0 H98 V36 H92 V10 L84 32 H72 L64 10 V36 H58 Z"/>
    <path d="M58 0 H70 V4 H58 Z M78 0 H86 V4 H78 Z M58 32 H98 V36 H58 Z"/>
  </g>
</svg>
