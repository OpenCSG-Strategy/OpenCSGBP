<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- D2iQ wordmark. Blue + a stacked "2" inside D. -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <g transform="translate(20,15)" font-family="Helvetica, Arial, sans-serif" font-weight="800">
    <text x="0" y="34" font-size="40" fill="#0064B0" letter-spacing="-2">D</text>
    <text x="32" y="34" font-size="22" fill="#0064B0">2</text>
    <text x="48" y="34" font-size="40" fill="#0064B0" letter-spacing="-2">iQ</text>
  </g>
</svg>
