<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- Mesosphere: clean sphere (half-shaded globe) + bold wordmark. -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <g transform="translate(18,10)">
    <!-- full circle (light side) -->
    <circle cx="25" cy="25" r="22" fill="#E8F4F9"/>
    <!-- shaded right half -->
    <path d="M25 3 A22 22 0 0 1 25 47 Z" fill="#13A0D8"/>
    <!-- vertical meridian -->
    <line x1="25" y1="3" x2="25" y2="47" stroke="#1B4A6B" stroke-width="1.2" opacity="0.6"/>
    <!-- equator -->
    <line x1="3" y1="25" x2="47" y2="25" stroke="#1B4A6B" stroke-width="1.2" opacity="0.5"/>
    <!-- outer ring -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#1B4A6B" stroke-width="2"/>
  </g>
  <text x="76" y="32" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="17" fill="#1B4A6B" letter-spacing="-0.3">meso</text>
  <text x="76" y="50" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="17" fill="#13A0D8" letter-spacing="-0.3">SPHERE</text>
</svg>
