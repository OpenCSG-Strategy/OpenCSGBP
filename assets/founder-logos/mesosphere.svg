<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- Mesosphere wordmark (legacy brand, used in 2013-2019; founder era) -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <g transform="translate(8,38)" font-family="Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="0.5">
    <text font-size="20" fill="#1A2A3A">MESO</text>
    <text x="68" font-size="20" fill="#13A0D8">SPHERE</text>
  </g>
  <!-- subtle cluster dots, alluding to distributed systems -->
  <g fill="#13A0D8" opacity="0.7">
    <circle cx="100" cy="14" r="1.6"/>
    <circle cx="110" cy="18" r="1.6"/>
    <circle cx="120" cy="14" r="1.6"/>
    <circle cx="105" cy="22" r="1.6"/>
    <circle cx="115" cy="22" r="1.6"/>
  </g>
</svg>
