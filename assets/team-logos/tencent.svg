<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- Tencent: penguin + "Tencent" / 腾讯 wordmark -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <g transform="translate(16,10)">
    <!-- penguin mark -->
    <ellipse cx="20" cy="22" rx="11" ry="13" fill="#1A89F0"/>
    <ellipse cx="20" cy="25" rx="6.5" ry="9" fill="#FFFFFF"/>
    <ellipse cx="18" cy="20" rx="1.5" ry="2" fill="#1A1A1A"/>
    <ellipse cx="22" cy="20" rx="1.5" ry="2" fill="#1A1A1A"/>
    <polygon points="17,24 23,24 20,28" fill="#F5A623"/>
    <ellipse cx="14" cy="40" rx="5" ry="2" fill="#F5A623"/>
    <ellipse cx="26" cy="40" rx="5" ry="2" fill="#F5A623"/>
  </g>
  <text x="55" y="33" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="#1A1A1A" letter-spacing="-0.5">Tencent</text>
  <text x="55" y="50" font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="11" fill="#1A1A1A" letter-spacing="3">腾  讯</text>
</svg>
