<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- Glodon 广联达: building blocks glyph + wordmark -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <!-- glyph: stacked blocks forming a building -->
  <g transform="translate(16,14)" fill="#C8102E">
    <rect x="0" y="20" width="10" height="22"/>
    <rect x="10" y="10" width="10" height="32"/>
    <rect x="20" y="0" width="10" height="42"/>
  </g>
  <g transform="translate(56,38)" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-weight="700">
    <text x="0" y="0" font-size="20" fill="#C8102E" letter-spacing="2">广联达</text>
  </g>
  <g transform="translate(140,40)" font-family="Helvetica, Arial, sans-serif" font-weight="700">
    <text x="0" y="0" font-size="11" fill="#C8102E" letter-spacing="1">GLODON</text>
  </g>
</svg>
