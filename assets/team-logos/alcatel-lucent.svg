<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" preserveAspectRatio="xMidYMid meet">
  <!-- Alcatel-Lucent: stacked diamond glyph + wordmark -->
  <rect width="200" height="70" fill="#FFFFFF"/>
  <g transform="translate(20,12)">
    <!-- glyph: rotated squares -->
    <g fill="#E51937">
      <rect x="6" y="14" width="14" height="14" transform="rotate(45 13 21)"/>
    </g>
    <g fill="#1A1A1A">
      <rect x="18" y="14" width="14" height="14" transform="rotate(45 25 21)"/>
    </g>
  </g>
  <g transform="translate(60,40)" font-family="Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="18" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Alcatel-Lucent</text>
  </g>
</svg>
