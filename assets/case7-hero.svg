<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 740" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AI 控制层：私有数据 → 治理 → Agent 与多终端输出">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4FAF8"/>
      <stop offset="100%" stop-color="#E4F1ED"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E5C52"/>
      <stop offset="100%" stop-color="#0A3F38"/>
    </linearGradient>
    <linearGradient id="midG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E6D61"/>
      <stop offset="100%" stop-color="#155247"/>
    </linearGradient>
    <linearGradient id="topG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7AD0C2"/>
      <stop offset="100%" stop-color="#38A695"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="740" fill="url(#bg)"/>

  <!-- soft grid -->
  <g opacity="0.5" stroke="#A5C6C0" stroke-width="0.8">
    <line x1="0" y1="130" x2="1600" y2="130"/>
    <line x1="0" y1="610" x2="1600" y2="610"/>
    <line x1="400" y1="130" x2="400" y2="610"/>
    <line x1="800" y1="130" x2="800" y2="610"/>
    <line x1="1200" y1="130" x2="1200" y2="610"/>
  </g>

  <!-- TIER 1 (top): Agent outputs onto many terminals -->
  <g transform="translate(0 130)">
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#topG)"/>
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#shine)"/>

    <!-- AGENT hub (highlight) -->
    <g transform="translate(800 50)">
      <circle r="60" fill="#0F4C44" stroke="#FFFFFF" stroke-width="3"/>
      <text y="-2" text-anchor="middle" font-family="Inter, Arial" font-size="28" font-weight="800" fill="#FFFFFF">AGENT</text>
      <text y="24" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#7AD0C2" letter-spacing="2">核心运行体</text>
    </g>

    <!-- supporting blocks -->
    <g font-family="Inter, Arial" fill="#FFFFFF" text-anchor="middle">
      <g transform="translate(440 50)">
        <rect x="-90" y="-26" width="180" height="52" rx="4" fill="#1E6D61" stroke="#E6F5F1"/>
        <text y="-2" font-size="17" font-weight="700">模型</text>
        <text y="18" font-size="11" opacity="0.85">已批准</text>
      </g>
      <g transform="translate(610 50)">
        <rect x="-66" y="-26" width="132" height="52" rx="4" fill="#1E6D61" stroke="#E6F5F1"/>
        <text y="-2" font-size="17" font-weight="700">提示词</text>
        <text y="18" font-size="11" opacity="0.85">PROMPT</text>
      </g>
      <g transform="translate(990 50)">
        <rect x="-66" y="-26" width="132" height="52" rx="4" fill="#1E6D61" stroke="#E6F5F1"/>
        <text y="-2" font-size="17" font-weight="700">技能</text>
        <text y="18" font-size="11" opacity="0.85">SKILL</text>
      </g>
      <g transform="translate(1160 50)">
        <rect x="-90" y="-26" width="180" height="52" rx="4" fill="#1E6D61" stroke="#E6F5F1"/>
        <text y="-2" font-size="17" font-weight="700">工作流</text>
        <text y="18" font-size="11" opacity="0.85">WORKFLOW</text>
      </g>
    </g>

    <g font-family="Inter, Arial" fill="#FFFFFF" text-anchor="middle">
      <g transform="translate(260 50)">
        <rect x="-60" y="-26" width="120" height="52" rx="4" fill="#38A695"/>
        <text y="6" font-size="16" font-weight="700">知识库</text>
      </g>
      <g transform="translate(1340 50)">
        <rect x="-60" y="-26" width="120" height="52" rx="4" fill="#38A695"/>
        <text y="6" font-size="16" font-weight="700">MCP</text>
      </g>
    </g>
  </g>

  <!-- pillars between tiers -->
  <g stroke="#1E6D61" stroke-width="3" fill="none" opacity="0.7">
    <line x1="180" y1="230" x2="180" y2="330"/>
    <line x1="1420" y1="230" x2="1420" y2="330"/>
    <line x1="180" y1="440" x2="180" y2="540"/>
    <line x1="1420" y1="440" x2="1420" y2="540"/>
  </g>

  <!-- TIER 2 (mid): governance -->
  <g transform="translate(0 330)">
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#midG)"/>
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#shine)"/>

    <g font-family="Inter, Arial" fill="#FFFFFF" text-anchor="middle">
      <text x="800" y="-18" font-size="14" font-weight="800" letter-spacing="3" fill="#0F4C44">GOVERNANCE · 治理层</text>
      <g transform="translate(330 50)">
        <rect x="-90" y="-26" width="180" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="-2" font-size="17" font-weight="700">权限</text>
        <text y="18" font-size="11" opacity="0.85">RBAC</text>
      </g>
      <g transform="translate(530 50)">
        <rect x="-90" y="-26" width="180" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="-2" font-size="17" font-weight="700">审计</text>
        <text y="18" font-size="11" opacity="0.85">AUDIT</text>
      </g>
      <g transform="translate(700 50)">
        <rect x="-66" y="-26" width="132" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="-2" font-size="17" font-weight="700">评测</text>
        <text y="18" font-size="11" opacity="0.85">EVAL</text>
      </g>
      <g transform="translate(870 50)">
        <rect x="-66" y="-26" width="132" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="-2" font-size="17" font-weight="700">沙箱</text>
        <text y="18" font-size="11" opacity="0.85">SANDBOX</text>
      </g>
      <g transform="translate(1060 50)">
        <rect x="-90" y="-26" width="180" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="-2" font-size="17" font-weight="700">可观测</text>
        <text y="18" font-size="11" opacity="0.85">OBSERVE</text>
      </g>
      <g transform="translate(1240 50)">
        <rect x="-58" y="-26" width="116" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2"/>
        <text y="6" font-size="16" font-weight="700">发布</text>
      </g>
    </g>
  </g>

  <!-- TIER 3 (bottom): private data & infra -->
  <g transform="translate(0 540)">
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#floorG)"/>
    <polygon points="80,0 240,50 1480,50 1560,0 1480,100 240,100" fill="url(#shine)"/>

    <g font-family="Inter, Arial" fill="#FFFFFF" text-anchor="middle">
      <text x="800" y="-16" font-size="14" font-weight="800" letter-spacing="3" fill="#1E6D61">PRIVATE FOUNDATION · 私有数据底座</text>
      <g transform="translate(380 50)">
        <circle r="44" fill="#0A3F38" stroke="#7AD0C2" stroke-width="2"/>
        <text y="7" font-size="17" font-weight="700">数据</text>
      </g>
      <g transform="translate(590 50)">
        <circle r="44" fill="#0A3F38" stroke="#7AD0C2" stroke-width="2"/>
        <text y="7" font-size="17" font-weight="700">算力</text>
      </g>
      <g transform="translate(800 50)">
        <circle r="44" fill="#0A3F38" stroke="#7AD0C2" stroke-width="2"/>
        <text y="7" font-size="17" font-weight="700">代码</text>
      </g>
      <g transform="translate(1010 50)">
        <circle r="44" fill="#0A3F38" stroke="#7AD0C2" stroke-width="2"/>
        <text y="7" font-size="17" font-weight="700">知识</text>
      </g>
      <g transform="translate(1240 50)">
        <rect x="-110" y="-26" width="220" height="52" rx="4" fill="#0F4C44" stroke="#7AD0C2" stroke-width="2"/>
        <text y="-2" font-size="15" font-weight="700">私有 / 本地 / 隔离</text>
        <text y="18" font-size="11" opacity="0.85">DATA STAYS IN-DOMAIN</text>
      </g>
    </g>
  </g>

  <!-- up-flow arrows from bottom → top -->
  <g stroke="#7AD0C2" stroke-width="2.4" fill="none" opacity="0.55" stroke-dasharray="10 10">
    <path d="M180 640 L180 130"/>
    <path d="M1420 640 L1420 130"/>
  </g>
</svg>
